name: Deploy Action Studio to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'ActionStudio/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ActionStudio
        run: npm install

      - name: Build
        working-directory: ActionStudio
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ActionStudio/GithubPagesSite/docs
