name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "ActionStudio/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ActionStudio/package-lock.json

      - name: Install dependencies
        working-directory: ActionStudio
        run: npm install

      - name: Build
        working-directory: ActionStudio
        run: npm run build

      - name: Verify site outputs exist
        run: |
          test -f ActionStudio/GithubPagesSite/docs/index.html
          test -f ActionStudio/GithubPagesSite/docs/index.js
          test -f ActionStudio/GithubPagesSite/docs/index.css
          ls -la ActionStudio/GithubPagesSite/docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ActionStudio/GithubPagesSite/docs

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
